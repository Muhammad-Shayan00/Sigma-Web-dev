<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* element selector */
        div{
            background-color: aquamarine;
        }
        /* class selector */
        .red{
            background-color: red;
        }
        /* id selector */
        #p1{
            color: blue;
        }
        /* child  selector */
        div > h5{
            color: rgb(255, 15, 215);
        }
         /* desendent  selector */
        div > h3{
            color: rgb(255, 77, 1);
        }
         /* universal selector */
        *{
            margin: 0;
            padding: 0;
        }
           /* pseudo selector */
        a:visited{
            color: blueviolet;
        }
        a:link{
            color: red;
        }
        #link1:active{
            color: black;
        }
        a:hover{
            background-color: cadetblue;
        }


    </style>
</head>
<body>
    <div>
        <p>hy i am paragraph no 1</p>
    </div>
    <div class="red">
        <p id="p1">hy i am paragraph no 2</p>
    </div>
    <div>
        <p>hy i am paragraph no 3
            <h3>i am heading 3</h3>
        </p>
        <h5>hy i am heading 5 </h5>
    </div>
    <div>
        <a href="https://www.google.com">go to google</a>
        <a id="link1" href="https://www.faceboof.com">go to facebook</a>
    </div>
    
</body>
</html>
