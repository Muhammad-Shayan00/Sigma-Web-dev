<!DOCTYPE html>
<html lang="en">
    
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font-family: "Nunito", sans-serif;
        }

        .box{
            width: 250px;
            /* background-color: rgb(34, 121, 196); */
            padding: 10px;
            text-align: center;
            border: 1px solid rgb(201, 201, 201);
            border-radius: 10px;
        }
        img{
            border-radius: 10px;
        }
        .button_div{
            /* border: 1px solid grey; */
            height: 35px;
            display: flex;
        }
        .button{
            border: 0.5px solid rgb(201, 201, 201);
            height: 22px;
            width: 60px;
            margin-top: 5px;
            margin-left: 10px;
            border-radius: 20px;
            

        }
        p{
            padding: 0;
            margin: auto;
            margin-top: 2px;
            font-size: small;
            color:rgb(64, 58, 58) ;

        }
        .heading_box{
            margin: 0;
            padding: 0;
            text-align: left;

        }
        h3{
            margin: 0;
            padding: 0;
            margin-top: 8px;

        }
        .text_box{
            /* border: 1px solid blue;  */
            height: 100px;
            margin: 0;
            padding: 0;
            text-align: left;
            padding-top: 10px;
        }
        .text{
            font-size: 15px;
        }
        .button_box{
            height: 40px;
            /* border: 1px solid green; */
            text-align: center;
        }
        .blue_button{
            text-align: center;
            border: 1px solid blue;
            background-color: rgb(0, 76, 255);
            height: 30px;
            width: 90px;
            border-radius: 25px;
             margin: 0 auto; 
        }
        .blue_button_text{
            color: white;
            margin: 0;padding: 0;
            margin-top: 5px;
        }
        

        
    </style>
</head>
<body>
    <div class="box">
        <img src="pic1.png" width="250" alt="">
        <div class="button_div">
            <div class="button">
                <p>Nature</p>
            </div>
            <div class="button">
                <p>Lake</p>
            </div>
            
        </div>
        <div style=" height: 30px;" class="heading_box">
            <h3>Lago di Braies</h3>
        </div>
        <div class="text_box">
            
            <p class="text">Lorem ipsum  consectetur adipisicing elit. Blanditiis provident eaque tenetur porro corrupti error quaerat autem velit et ea?</p>

        </div>
        <div class="button_box">
            <div class="blue_button">
                <p class="blue_button_text">
                    Read more
                </p>

            </div>

        </div>

    </div>
    
</body>
</html>
