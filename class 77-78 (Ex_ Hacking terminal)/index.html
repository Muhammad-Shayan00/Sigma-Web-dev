<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-color: green;
            color: white;
        }
    </style>
</head>

<body>
    

    <script>

        function timepause() {

            let randomnumber= 1 + 3 * Math.random();
            return new Promise(resolve => {
                setTimeout(resolve, randomnumber * 1000);
            });
        }

        let text = ["Initialized Hacking",
            "Reading your Files",
            "Password files Detected",
            "Sending all passwords and personal files to server",
            "Cleaning up"]


        async function run() {

            let t = setInterval(() => {
                let last = document.body.getElementsByTagName("div");
                last = last[last.length - 1]
                if(last.innerHTML.endsWith("...")){
                    last.innerHTML = last.innerHTML.slice(0, last.innerHTML.length-3)
                }
                else{

                    last.innerHTML = last.innerHTML + "."
                }

            }, 100);









            for (let index = 0; index < text.length; index++) {
                const element = text[index];

                await timepause();
                document.body.innerHTML = document.body.innerHTML + "<div>"+ element + "</div>"
                document.body.innerHTML = document.body.innerHTML + "<br>"

            };
            clearInterval(t)
        }

        run()

       




    </script>

</body>

</html>
