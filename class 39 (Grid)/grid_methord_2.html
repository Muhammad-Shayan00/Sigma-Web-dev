<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            width: 100vw;
            border: 2px solid red;
            display: grid;
            /* grid-template-columns: 50px 50px 20px; */
            grid-template-columns: 1fr 3fr 2fr;
            grid-template-rows: 70px 20px 40px;
            grid-template-areas: "nav nav nav"
                                 "context context sidebar"
                                 " empty footer footer ";
            gap: 30px;   
            justify-items: center;      
            align-items: center;            
            
        }
        .items{
            /* background-color: blue; */
            border: 2px solid black;
            height: 40px;
            width: 40px;
        }
        .i1{
            grid-area: nav;
        }
        .i2{
            grid-area: context;
        }
        .i3{
            grid-area: sidebar;
        }
        .i4{
            grid-area: footer;
        }
        
    </style>
</head>
<body>
    <div class="container">
        <div class="items i1">1</div>
        <div class="items i2">2</div>
        <div class="items i3">3</div>
        <div class="items i4">4</div>
    </div>
</body>
</html>
