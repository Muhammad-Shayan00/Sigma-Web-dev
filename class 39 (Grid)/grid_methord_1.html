<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            width: 100vw;
            border: 2px solid red;
            display: grid;
            grid-template-columns:[pehleline] 50px [dosreline] 100px [teesreline] ;
            grid-template-rows: 20px 80px 50px;

        }
        .items{
            /* background-color: blue; */
            border: 2px solid black;
        }
        .i4{
            grid-row: 1/2;
            grid-column: pehleline/teesreline;
        }
        .i1{
            grid-row: 1/2;
            grid-column: 1/2;
            background-color: aqua;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="items i1">1</div>
        <div class="items i2">2</div>
        <div class="items i3">3</div>
        <div class="items i4">4</div>
        <div class="items i5">5</div>
    </div>
</body>
</html>
